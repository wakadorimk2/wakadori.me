name: pixiv-reachability-test
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -o /dev/null -w 'ajax status: %{http_code}\n' \
            -H 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36' \
            -H 'Referer: https://www.pixiv.net/' -H 'Accept: application/json' \
            'https://www.pixiv.net/ajax/user/75962333/profile/all'

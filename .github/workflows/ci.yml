name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out the exact source revision
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ env.TARGET_SHA }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CI and cleanup policy
        run: node --test tests/ci/*.test.mjs

      - name: Check Astro and TypeScript
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: PLAYWRIGHT_BROWSERS_PATH=.playwright npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run test:e2e

      - name: Record the source revision
        run: printf '%s\n' "$TARGET_SHA" > pages-commit-sha.txt

      - name: Save deployable Pages bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pages-deploy-bundle-${{ env.TARGET_SHA }}
          path: |
            dist/
            functions/
            pages-commit-sha.txt
          if-no-files-found: error
          retention-days: 7

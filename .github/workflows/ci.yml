name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node --test tests/ci/*.test.mjs
      - run: npm run check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: PLAYWRIGHT_BROWSERS_PATH=.playwright npx playwright install --with-deps chromium
      - run: npm run test:e2e
